name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write      # required for Cloudflare deployment status

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: e57cdde5f4b925eb9608091648b1e9bb
          projectName: ret                  # must match `name` in wrangler.toml
          directory: public                 # must match `pages_build_output_dir` in wrangler.toml
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}   # posts deployment status on PRs
          wranglerVersion: '3'
